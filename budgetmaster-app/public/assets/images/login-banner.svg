<svg width="700" height="600" viewBox="0 0 700 600" fill="none" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="700" height="600" rx="40" fill="#0F172A"/>

<!-- Glow -->
<circle cx="580" cy="120" r="180" fill="#2563EB" fill-opacity="0.18"/>
<circle cx="180" cy="480" r="180" fill="#7C3AED" fill-opacity="0.12"/>

<!-- Main Glass Card -->
<rect x="140" y="120" width="420" height="340" rx="28"
fill="rgba(255,255,255,0.04)"
stroke="rgba(255,255,255,0.08)"
stroke-width="1.5"/>

<!-- Top Title -->
<rect x="180" y="170" width="160" height="18" rx="9" fill="#E2E8F0"/>

<!-- Subtitle -->
<rect x="180" y="205" width="220" height="10" rx="5" fill="#64748B"/>

<!-- Input 1 -->
<rect x="180" y="260" width="340" height="58" rx="16"
fill="#111827"
stroke="#1E293B"
stroke-width="2"/>

<circle cx="210" cy="289" r="8" fill="#38BDF8"/>

<rect x="230" y="282" width="120" height="12" rx="6" fill="#475569"/>

<!-- Input 2 -->
<rect x="180" y="340" width="340" height="58" rx="16"
fill="#111827"
stroke="#1E293B"
stroke-width="2"/>

<circle cx="210" cy="369" r="8" fill="#38BDF8"/>

<rect x="230" y="362" width="90" height="12" rx="6" fill="#475569"/>

<!-- Button -->
<rect x="180" y="430" width="340" height="56" rx="18"
fill="#2563EB"/>

<rect x="300" y="452" width="100" height="12" rx="6" fill="white"/>

<!-- Floating Blur -->
<circle cx="540" cy="420" r="60" fill="#38BDF8" fill-opacity="0.18"/>
<circle cx="170" cy="170" r="40" fill="#7C3AED" fill-opacity="0.15"/>

</svg>