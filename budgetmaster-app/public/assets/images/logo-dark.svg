<svg xmlns="http://www.w3.org/2000/svg" width="260" height="70" viewBox="0 0 260 70">
  <defs>

    <!-- Gradiente moderno -->
    <linearGradient id="textGradDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>

    <!-- Glow leve -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="1"
        stdDeviation="1.5"
        flood-color="#94a3b8"
        flood-opacity="0.25"/>
    </filter>

  </defs>

  <!-- Fundo claro -->
  <rect width="260" height="70" rx="16" fill="#f8fafc"/>

  <!-- Ícone -->
  <g transform="translate(18,18)">
    <rect x="0" y="18" width="6" height="14" rx="2" fill="#0ea5e9"/>
    <rect x="10" y="10" width="6" height="22" rx="2" fill="#22c55e"/>
    <rect x="20" y="4" width="6" height="28" rx="2" fill="#2563eb"/>
  </g>

  <!-- Texto -->
  <text x="55"
        y="44"
        font-size="30"
        font-weight="700"
        font-family="Segoe UI, Arial, sans-serif"
        fill="url(#textGradDark)"
        filter="url(#softShadow)"
        letter-spacing="0.4">
    BudgetMaster
  </text>

  <!-- Linha decorativa -->
  <rect x="55"
        y="50"
        width="145"
        height="3"
        rx="2"
        fill="#0ea5e9"
        opacity="0.25"/>
</svg>