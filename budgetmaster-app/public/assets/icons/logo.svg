<svg xmlns="http://www.w3.org/2000/svg" width="260" height="70" viewBox="0 0 260 70">
  <defs>
    <!-- Gradiente do texto -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="260" height="70" rx="16" fill="#0f172a"/>

  <!-- Ícone (gráfico simples) -->
  <g transform="translate(18,18)">
    <rect x="0" y="18" width="6" height="14" rx="2" fill="#38bdf8"/>
    <rect x="10" y="10" width="6" height="22" rx="2" fill="#22c55e"/>
    <rect x="20" y="4" width="6" height="28" rx="2" fill="#38bdf8"/>
  </g>

  <!-- Texto -->
  <text x="55" y="44"
        font-size="30"
        font-weight="bold"
        font-family="Segoe UI, Arial, sans-serif"
        fill="url(#textGrad)"
        filter="url(#shadow)"
        letter-spacing="0.5">
    BudgetMaster
  </text>

  <!-- Subtil underline decorativa -->
  <rect x="55" y="50" width="140" height="3" rx="2" fill="#38bdf8" opacity="0.4"/>
</svg>